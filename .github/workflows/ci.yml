name: CI

on:
  push:
    branches: [main, feature/vite-dashboard]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck, test, coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      DEV_MODE: "true"
      LOG_LEVEL: silent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build API
        run: npm run build

      - name: Build SDK
        run: npm run build:sdk

      - name: Build UI (Vite + React)
        run: npm run build:ui

      - name: Unit + integration tests with coverage
        run: npx vitest run --coverage
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  docker:
    name: Docker build + smoke
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Build API image (includes UI build stage)
        run: docker build -t ai-agent-security-monitor:ci .
      - name: Compose validation
        run: docker compose config -q